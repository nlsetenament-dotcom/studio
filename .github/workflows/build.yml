name: 🚀 Build Web + APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build Next.js y deploy en Vercel
  # ─────────────────────────────────────────────
  build-web:
    name: 🌐 Build Web (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build Next.js (export estático)
        run: npm run build
        env:
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}

      - name: Subir artefacto web
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Build APK Android con Capacitor
  # ─────────────────────────────────────────────
  build-apk:
    name: 📱 Build APK (Android)
    runs-on: ubuntu-latest
    needs: build-web  # Espera a que el web build pase

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17 (para Gradle/Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependencias
        run: npm ci

      - name: Build Next.js estático (para Capacitor)
        run: npm run build
        env:
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}

      - name: Copiar web build a Capacitor
        run: npx cap copy android

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Build APK debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: nls-companion-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── APK de Release firmado (solo en push a main) ──
      - name: Build APK Release (firmado)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: 🚀 Subir APK Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: nls-companion-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 3: Notificación de resultado
  # ─────────────────────────────────────────────
  notify:
    name: ✅ Resultado Final
    runs-on: ubuntu-latest
    needs: [build-web, build-apk]
    if: always()

    steps:
      - name: Estado del build
        run: |
          echo "Web build: ${{ needs.build-web.result }}"
          echo "APK build: ${{ needs.build-apk.result }}"
          if [[ "${{ needs.build-web.result }}" == "success" && "${{ needs.build-apk.result }}" == "success" ]]; then
            echo "✅ Todo el pipeline pasó exitosamente"
          else
            echo "❌ Hubo errores en el pipeline"
            exit 1
          fi
